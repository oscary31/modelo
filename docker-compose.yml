services:
  model-downloader:
    image: alpine:latest
    command: >
      sh -c "
        apk add --no-cache wget &&
        mkdir -p /models &&
        if [ ! -f /models/Qwen_Qwen3-4B-Q4_K_M.gguf ]; then
          echo 'Downloading model from Hugging Face...';
          wget -q --show-progress -O /models/Qwen_Qwen3-4B-Q4_K_M.gguf 'https://huggingface.co/Qwen/Qwen3-4B-GGUF/resolve/main/Qwen3-4B-Q4_K_M.gguf';
        else
          echo 'Model already exists, skipping download.';
        fi"
    volumes:
      - llama_models:/models
    restart: "no"

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - -m
      - /models/Qwen_Qwen3-4B-Q4_K_M.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    volumes:
      - llama_models:/models:ro
    ports:
      - "8080:8080"
    depends_on:
      model-downloader:
        condition: service_completed_successfully  # 👈 espera a que termine
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MODEL_API_URL=http://llama:8080/v1/chat/completions
    depends_on:
      - llama
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  llama_models: