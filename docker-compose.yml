services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - -m
      - /models/Qwen_Qwen3-4B-Q4_K_M.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    volumes:
      - ./backend/models:/models:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MODEL_API_URL=http://llama:8080/v1/chat/completions
    depends_on:
      - llama
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
